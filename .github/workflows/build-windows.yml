name: Build RoboArena for Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Repository herunterladen
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install pygame pathfinding pyinstaller

      - name: Windows-Version erstellen
        working-directory: src/Sprint2_RoboArena
        run: >
          pyinstaller
          --name "RoboArena"
          --windowed
          --contents-directory "."
          --add-data "Data;Data"
          --add-data "Music;Music"
          --add-data "SFX;SFX"
          --add-data "Screens;Screens"
          --add-data "Sprites;Sprites"
          main.py

      - name: Windows-Version bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: RoboArena-Windows
          path: src/Sprint2_RoboArena/dist/RoboArena/
